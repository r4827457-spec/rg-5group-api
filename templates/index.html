<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>REHAN 1M!!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* Animated Background */
body{
    margin:0;
    color:white;
    font-family:Arial;
    background: linear-gradient(-45deg,#0f1115,#0b0d12,#111827,#05060a);
    background-size:400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* Glass Card */
.glass{
    background: rgba(20, 24, 35, 0.7);
    backdrop-filter: blur(10px);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 20px rgba(0,255,255,0.15);
    transition:0.3s;
}

.glass:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(0,255,255,0.4);
}

/* Neon Title */
.neon{
    text-align:center;
    font-weight:bold;
    text-shadow:0 0 5px cyan,0 0 15px cyan,0 0 25px blue;
}

/* Glow Buttons */
.btn-glow{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    color:white;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

/* Pulse Animation */
.btn-glow::after{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    width:300%;
    height:300%;
    background:rgba(0,255,255,0.2);
    transition:0.5s;
    border-radius:50%;
    transform:translate(-50%,-50%) scale(0);
}

.btn-glow:hover::after{
    transform:translate(-50%,-50%) scale(1);
}

/* Colors */
.green{background:#00c853;}
.yellow{background:#ffab00;}
.red{background:#ff1744;}

/* Social Icons */
.social a{
    color:white;
    font-size:26px;
    margin:0 12px;
    transition:0.4s;
    display:inline-block;
}

.social a:hover{
    color:#00ffff;
    transform:rotate(10deg) scale(1.2);
    text-shadow:0 0 10px cyan;
}

/* Logs */
.log-box{
    height:230px;
    overflow:auto;
    background:#0a0c10;
    padding:10px;
    border-radius:10px;
    border:1px solid #2a2f3a;
    font-size:13px;
}

/* Input */
input{
    background:#0a0c10 !important;
    color:white !important;
    border:1px solid #2a2f3a !important;
}

/* Fade animation logs */
.log{
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(5px)}
    to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container mt-4">

    <!-- TITLE -->
    <h2 class="neon">⚡ REHAN 1M!! GROUP PANEL ⚡</h2>
    <p class="text-center">made by :- rehan</p>

    <!-- SOCIAL -->
    <div class="text-center social mb-3">
        <a href="https://www.instagram.com/rehan_gaming_2.0_?igsh=MWh0bGVpbzJ3Ym5jag==" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.youtube.com/@REHAN_GAMING_2.0" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>

    <!-- INPUT -->
    <div class="glass p-3 mb-3">
        <label>Enter UID</label>
        <input id="uid" class="form-control mt-2" placeholder="7436272383">
    </div>

    <!-- BUTTONS -->
    <div class="row g-3">

        <div class="col-md-4">
            <button class="btn-glow green" onclick="sendCmd(3)">
                🚀 SEND 3 GROUP
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn-glow yellow" onclick="sendCmd(5)">
                ⚡ SEND 5 GROUP
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn-glow red" onclick="sendCmd(6)">
                🔥 SEND 6 GROUP
            </button>
        </div>

    </div>

    <!-- LOGS -->
    <div class="glass p-3 mt-4">
        <h5>📡 Live Logs</h5>
        <div class="log-box" id="logs">
            <div class="log">[SYSTEM] Panel Started...</div>
        </div>
    </div>

</div>

<script>

function log(msg){
    let box = document.getElementById("logs");
    let div = document.createElement("div");
    div.classList.add("log");
    div.innerHTML = msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

async function sendCmd(type){
    let uid = document.getElementById("uid").value;

    if(!uid){
        alert("Enter UID");
        return;
    }

    try{
        let res = await fetch(`/${type}?uid=${uid}`);
        let data = await res.json();

        log(`✅ Command Sent → ${type} GROUP | UID: ${uid}`);

    }catch(e){
        log(`❌ Error sending command`);
    }
}

</script>

</body>
</html>
